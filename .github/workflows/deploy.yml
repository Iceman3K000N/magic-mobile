name: Deploy to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy-netlify:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: "./.next"
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-vercel:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy project-dri1j to Vercel (production)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "Deploying via Vercel Deploy Hook..."
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Hook triggered OK."
            exit 0
          fi
          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            echo "Deploying via Vercel CLI (project-dri1j)..."
            mkdir -p project-dri1j/.vercel
            printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > project-dri1j/.vercel/project.json
            cd project-dri1j
            npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
            exit 0
          fi
          echo "::error::Add GitHub Actions secrets for Vercel."
          echo "Easiest: Vercel → project-dri1j → Settings → Git → Deploy Hooks → Production hook URL"
          echo "Then: gh secret set VERCEL_DEPLOY_HOOK -R Iceman3K000N/magic-mobile -b'<hook-url>'"
          echo "Or set VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (see project-dri1j/scripts/deploy-vercel.sh)."
          exit 1
