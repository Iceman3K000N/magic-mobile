# Deploy `project-dri1j` to Vercel production on every push to `main`.
#
# Why: If the Vercel dashboard Git connection does not trigger builds, this workflow
# still deploys from GitHub Actions.
#
# Option A (simplest — one secret):
#   Vercel → project-dri1j → Settings → Git → Deploy Hooks → add "Production" hook,
#   then GitHub → repo → Settings → Secrets → Actions → add:
#     VERCEL_DEPLOY_HOOK = <the hook URL from Vercel>
#
# Option B (CLI — three secrets):
#   VERCEL_TOKEN      — https://vercel.com/account/tokens
#   VERCEL_ORG_ID     — Team → Settings → General (Team ID)
#   VERCEL_PROJECT_ID — Project → Settings → General (Project ID)
#
# If both A and B are set, the hook runs first (single production deploy).

name: Vercel — project-dri1j

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-project-dri1j-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -n "${VERCEL_DEPLOY_HOOK:-}" ]; then
            echo "Deploying via Vercel Deploy Hook..."
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            echo "Hook triggered OK."
            exit 0
          fi
          if [ -n "${VERCEL_TOKEN:-}" ] && [ -n "${VERCEL_ORG_ID:-}" ] && [ -n "${VERCEL_PROJECT_ID:-}" ]; then
            echo "Deploying via Vercel CLI..."
            mkdir -p project-dri1j/.vercel
            printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > project-dri1j/.vercel/project.json
            cd project-dri1j
            npx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
            exit 0
          fi
          echo "::error::Add GitHub Actions secrets for this repo."
          echo "Option A: create a Production Deploy Hook in Vercel and set VERCEL_DEPLOY_HOOK."
          echo "Option B: set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID."
          exit 1
